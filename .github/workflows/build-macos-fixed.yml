name: Build macOS App (Fixed)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number'
        required: false
        default: '3.0.0'

jobs:
  build-macos:
    runs-on: macos-14
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Set up Flutter (Pre-configure)
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
        cache: true
        
    - name: Configure Flutter for Flet
      run: |
        # Configurar Flutter para que Flet lo reconozca
        flutter config --no-analytics
        flutter precache --macos
        flutter doctor -v
        
        # Verificar que Flutter está correctamente configurado
        echo "Flutter path: $(which flutter)"
        echo "Flutter version: $(flutter --version)"
        
        # Configurar variables de entorno para Flet
        echo "FLUTTER_ROOT=$(flutter --version --machine | jq -r '.flutterRoot')" >> $GITHUB_ENV
        echo "FLUTTER_VERSION=$(flutter --version --machine | jq -r '.frameworkVersion')" >> $GITHUB_ENV
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flet
        
    - name: Verify Flet and Flutter integration
      run: |
        echo "Verificando integración Flet-Flutter..."
        flet --version
        python -c "import flet; print(f'Flet version: {flet.__version__}')"
        
        # Verificar que Flet puede encontrar Flutter
        echo "Verificando que Flet encuentra Flutter..."
        
    - name: Prepare build environment
      run: |
        # Crear directorio de build
        mkdir -p build
        
        # Verificar archivos del proyecto
        echo "📁 Verificando estructura del proyecto:"
        ls -la
        echo ""
        echo "📄 Archivo principal:"
        ls -la cronux_gui_v3.py
        echo ""
        echo "📂 Directorio CLI:"
        ls -la cli/
        echo ""
        echo "🎨 Directorio Assets:"
        ls -la assets/
        
    - name: Build macOS app with Flet
      env:
        FLET_CLI_NO_RICH_OUTPUT: "true"
      run: |
        echo "🚀 Iniciando build de macOS con Flet..."
        
        # Usar variables de entorno para evitar prompts interactivos
        export FLET_CLI_NO_RICH_OUTPUT=true
        
        flet build macos \
          --product "Cronux" \
          --project cronux \
          --build-version "${{ github.event.inputs.version || '3.0.0' }}" \
          --build-number "${{ github.run_number }}" \
          --org "com.cronux" \
          --bundle-id "com.cronux.gui" \
          --description "Sistema de control de versiones local" \
          --copyright "Copyright © 2024 Cronux" \
          --yes \
          --no-rich-output \
          --verbose
          
    - name: Verify build output
      run: |
        echo "🔍 Verificando resultado del build..."
        
        # Buscar archivos .app en todo el directorio build
        echo "Buscando archivos .app..."
        find . -name "*.app" -type d 2>/dev/null || echo "No se encontraron archivos .app"
        
        # Listar contenido del directorio build
        echo ""
        echo "📂 Contenido de build/:"
        if [ -d "build" ]; then
          find build/ -type f -name "*.app" -o -name "Cronux*" 2>/dev/null || echo "No se encontraron archivos relevantes"
          ls -la build/ 2>/dev/null || echo "Directorio build vacío"
        else
          echo "❌ Directorio build no existe"
        fi
        
        # Buscar en subdirectorios
        echo ""
        echo "🔍 Búsqueda exhaustiva de la app:"
        APP_PATH=$(find . -name "*.app" -type d | head -1)
        if [ -n "$APP_PATH" ]; then
          echo "✅ App encontrada: $APP_PATH"
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
          echo "📊 Tamaño: $(du -sh "$APP_PATH")"
          echo "📋 Contenido:"
          ls -la "$APP_PATH/Contents/" 2>/dev/null || echo "No se puede listar contenido"
        else
          echo "❌ No se encontró archivo .app"
          echo "📂 Listado completo de archivos:"
          find . -type f -name "*Cronux*" 2>/dev/null || echo "No se encontraron archivos con 'Cronux'"
          exit 1
        fi
        
    - name: Create DMG
      if: env.APP_PATH != ''
      run: |
        echo "💿 Creando DMG..."
        
        DMG_NAME="Cronux-v${{ github.event.inputs.version || '3.0.0' }}-build${{ github.run_number }}-macOS"
        
        # Crear DMG
        hdiutil create \
          -volname "Cronux" \
          -srcfolder "$APP_PATH" \
          -ov \
          -format UDZO \
          "${DMG_NAME}.dmg"
          
        if [ -f "${DMG_NAME}.dmg" ]; then
          echo "✅ DMG creado exitosamente: ${DMG_NAME}.dmg"
          echo "📊 Tamaño del DMG: $(du -sh "${DMG_NAME}.dmg")"
          echo "DMG_NAME=${DMG_NAME}" >> $GITHUB_ENV
        else
          echo "❌ Error al crear DMG"
          exit 1
        fi
        
    - name: Upload DMG artifact
      if: env.DMG_NAME != ''
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.DMG_NAME }}
        path: ${{ env.DMG_NAME }}.dmg
        retention-days: 30
        
    - name: Upload App Bundle artifact
      if: env.APP_PATH != ''
      uses: actions/upload-artifact@v4
      with:
        name: Cronux-App-Bundle-v${{ github.event.inputs.version || '3.0.0' }}-build${{ github.run_number }}
        path: ${{ env.APP_PATH }}
        retention-days: 30
        
    - name: Build Summary
      if: always()
      run: |
        echo "## 📊 Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
        echo "- **macOS Version:** $(sw_vers -productVersion)" >> $GITHUB_STEP_SUMMARY
        echo "- **Python Version:** $(python --version)" >> $GITHUB_STEP_SUMMARY
        echo "- **Flutter Version:** $(flutter --version | head -1)" >> $GITHUB_STEP_SUMMARY
        echo "- **Flet Version:** $(flet --version)" >> $GITHUB_STEP_SUMMARY
        echo "- **Build Number:** ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
        
        if [ -n "${{ env.APP_PATH }}" ]; then
          echo "- **App Created:** ✅ ${{ env.APP_PATH }}" >> $GITHUB_STEP_SUMMARY
        else
          echo "- **App Created:** ❌ Failed" >> $GITHUB_STEP_SUMMARY
        fi
        
        if [ -n "${{ env.DMG_NAME }}" ]; then
          echo "- **DMG Created:** ✅ ${{ env.DMG_NAME }}.dmg" >> $GITHUB_STEP_SUMMARY
        else
          echo "- **DMG Created:** ❌ Failed" >> $GITHUB_STEP_SUMMARY
        fi