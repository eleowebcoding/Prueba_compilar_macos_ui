name: Build macOS App v2

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number'
        required: false
        default: '3.0.0'

jobs:
  build-macos:
    runs-on: macos-14  # Usar macOS 14 específicamente
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
        
    - name: Verify system info
      run: |
        echo "macOS version: $(sw_vers -productVersion)"
        echo "Python version: $(python --version)"
        echo "Flutter version: $(flutter --version)"
        echo "Xcode version: $(xcodebuild -version)"
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flet
        
    - name: Verify Flet installation
      run: |
        flet --version
        python -c "import flet; print(f'Flet version: {flet.__version__}')"
        
    - name: Prepare build environment
      run: |
        # Crear directorio de build si no existe
        mkdir -p build
        
        # Verificar archivos necesarios
        echo "Verificando archivos..."
        ls -la cronux_gui_v3.py
        ls -la cli/
        ls -la assets/
        
    - name: Build macOS app
      run: |
        echo "Iniciando build de macOS..."
        
        flet build macos \
          --product "Cronux" \
          --project cronux \
          --build-version ${{ github.event.inputs.version || '3.0.0' }} \
          --build-number ${{ github.run_number }} \
          --org com.cronux \
          --bundle-id com.cronux.gui \
          --description "Sistema de control de versiones local" \
          --copyright "Copyright © 2024 Cronux" \
          --yes \
          --verbose
          
    - name: Verify build output
      run: |
        echo "Verificando build..."
        ls -la build/
        
        if [ -d "build/macos" ]; then
          echo "✅ Directorio build/macos encontrado"
          ls -la build/macos/
        else
          echo "❌ Directorio build/macos no encontrado"
          echo "Contenido de build/:"
          find build/ -type f -name "*.app" 2>/dev/null || echo "No se encontraron archivos .app"
          exit 1
        fi
        
        # Buscar el archivo .app
        APP_PATH=$(find build/ -name "*.app" -type d | head -1)
        if [ -n "$APP_PATH" ]; then
          echo "✅ App encontrada: $APP_PATH"
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
          du -sh "$APP_PATH"
        else
          echo "❌ No se encontró archivo .app"
          exit 1
        fi
        
    - name: Create DMG
      run: |
        echo "Creando DMG..."
        
        DMG_NAME="Cronux-v${{ github.event.inputs.version || '3.0.0' }}-build${{ github.run_number }}-macOS"
        
        # Crear DMG usando hdiutil
        hdiutil create -volname "Cronux" \
          -srcfolder "$APP_PATH" \
          -ov -format UDZO \
          "${DMG_NAME}.dmg"
          
        # Verificar DMG
        if [ -f "${DMG_NAME}.dmg" ]; then
          echo "✅ DMG creado: ${DMG_NAME}.dmg"
          ls -la "${DMG_NAME}.dmg"
          echo "DMG_NAME=${DMG_NAME}" >> $GITHUB_ENV
        else
          echo "❌ Error al crear DMG"
          exit 1
        fi
        
    - name: Upload DMG artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.DMG_NAME }}
        path: ${{ env.DMG_NAME }}.dmg
        retention-days: 30
        
    - name: Upload App Bundle artifact
      uses: actions/upload-artifact@v4
      with:
        name: Cronux-App-Bundle-v${{ github.event.inputs.version || '3.0.0' }}-build${{ github.run_number }}
        path: ${{ env.APP_PATH }}
        retention-days: 30
        
    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ${{ env.DMG_NAME }}.dmg
        body: |
          ## Cronux GUI v${{ github.event.inputs.version || '3.0.0' }} - Build ${{ github.run_number }}
          
          ### 📦 Instalación
          1. Descarga `${{ env.DMG_NAME }}.dmg`
          2. Abre el DMG
          3. Arrastra Cronux.app a Applications
          4. Ejecuta desde Launchpad
          
          ### ✨ Características
          - ✅ Icono único (sin doble icono)
          - ✅ Interfaz nativa de macOS
          - ✅ Compilado con Flutter/Flet en macOS 14
          - ✅ Compatible con macOS 10.15+
          
          ### 🔧 Información Técnica
          - **Compilado en:** macOS 14 (GitHub Actions)
          - **Python:** 3.11
          - **Flutter:** 3.24.0
          - **Flet:** Latest
          - **Build:** ${{ github.run_number }}
          - **Commit:** ${{ github.sha }}
          
          ### 📝 Notas
          - Compilado usando `flet build macos` oficial
          - Resuelve el problema del doble icono completamente
          - Universal binary (Intel + Apple Silicon)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Build Summary
      if: always()
      run: |
        echo "## 📊 Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
        echo "- **macOS Version:** $(sw_vers -productVersion)" >> $GITHUB_STEP_SUMMARY
        echo "- **Python Version:** $(python --version)" >> $GITHUB_STEP_SUMMARY
        echo "- **Flutter Version:** $(flutter --version | head -1)" >> $GITHUB_STEP_SUMMARY
        echo "- **Build Number:** ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
        
        if [ -n "${{ env.DMG_NAME }}" ]; then
          echo "- **DMG Created:** ✅ ${{ env.DMG_NAME }}.dmg" >> $GITHUB_STEP_SUMMARY
        else
          echo "- **DMG Created:** ❌ Failed" >> $GITHUB_STEP_SUMMARY
        fi