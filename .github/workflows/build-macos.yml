name: Build macOS App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flet
        
    - name: Verify Flet installation
      run: |
        flet --version
        python -c "import flet; print(f'Flet version: {flet.__version__}')"
        
    - name: Build macOS app
      run: |
        flet build macos \
          --product "Cronux" \
          --project cronux \
          --build-version 3.0.0 \
          --build-number ${{ github.run_number }} \
          --org com.cronux \
          --bundle-id com.cronux.gui \
          --description "Sistema de control de versiones local" \
          --copyright "Copyright © 2024 Cronux"
          
    - name: Verify build
      run: |
        ls -la build/macos/
        if [ -d "build/macos/Cronux.app" ]; then
          echo "✅ App bundle created successfully"
          du -sh build/macos/Cronux.app
        else
          echo "❌ App bundle not found"
          exit 1
        fi
        
    - name: Create DMG
      run: |
        # Crear DMG usando hdiutil
        hdiutil create -volname "Cronux" \
          -srcfolder build/macos/Cronux.app \
          -ov -format UDZO \
          Cronux-v3.0.0-build${{ github.run_number }}.dmg
          
        # Verificar DMG
        ls -la *.dmg
        
    - name: Upload DMG artifact
      uses: actions/upload-artifact@v3
      with:
        name: Cronux-macOS-v3.0.0-build${{ github.run_number }}
        path: Cronux-v3.0.0-build${{ github.run_number }}.dmg
        
    - name: Upload App Bundle artifact
      uses: actions/upload-artifact@v3
      with:
        name: Cronux-App-Bundle-v3.0.0-build${{ github.run_number }}
        path: build/macos/Cronux.app
        
    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          Cronux-v3.0.0-build${{ github.run_number }}.dmg
        body: |
          ## Cronux GUI v3.0.0 - Build ${{ github.run_number }}
          
          ### 📦 Instalación
          1. Descarga `Cronux-v3.0.0-build${{ github.run_number }}.dmg`
          2. Abre el DMG
          3. Arrastra Cronux.app a Applications
          4. Ejecuta desde Launchpad
          
          ### ✨ Características
          - ✅ Icono único (sin doble icono)
          - ✅ Interfaz nativa de macOS
          - ✅ Compilado con Flutter/Flet
          - ✅ Optimizado para macOS 14+
          
          ### 🔧 Información Técnica
          - Compilado en: macOS ${{ runner.os }}
          - Python: 3.11
          - Flutter: 3.19.0
          - Flet: Latest
          - Build: ${{ github.run_number }}
          - Commit: ${{ github.sha }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}