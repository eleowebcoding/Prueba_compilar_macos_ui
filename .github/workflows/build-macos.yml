name: Build macOS App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number'
        required: false
        default: '3.0.0'

jobs:
  build-macos:
    runs-on: macos-14
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
        cache: true
        
    - name: Configure Flutter
      run: |
        flutter config --no-analytics
        flutter precache --macos
        flutter doctor -v
        
    - name: Install Flet
      run: |
        python -m pip install --upgrade pip
        pip install flet
        
    - name: Verify setup
      run: |
        echo "✅ Python: $(python --version)"
        echo "✅ Flutter: $(flutter --version | head -1)"
        echo "✅ Flet: $(flet --version)"
        echo "✅ Files: $(ls -la cronux_gui_v3.py cli/ assets/)"
        
    - name: Build macOS app
      env:
        FLET_CLI_NO_RICH_OUTPUT: "true"
      run: |
        flet build macos \
          --module-name "cronux_gui_v3" \
          --product "Cronux" \
          --project cronux \
          --build-version "${{ github.event.inputs.version || '3.0.0' }}" \
          --build-number "${{ github.run_number }}" \
          --org "com.cronux" \
          --bundle-id "com.cronux.gui" \
          --description "Sistema de control de versiones local" \
          --copyright "Copyright © 2024 Cronux" \
          --yes \
          --no-rich-output
          
    - name: Find and verify app
      run: |
        APP_PATH=$(find . -name "*.app" -type d | head -1)
        if [ -n "$APP_PATH" ]; then
          echo "✅ App found: $APP_PATH"
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
          du -sh "$APP_PATH"
        else
          echo "❌ App not found"
          find . -name "*Cronux*" -type f 2>/dev/null || echo "No Cronux files found"
          exit 1
        fi
        
    - name: Sign app (ad-hoc for GitHub Actions)
      run: |
        echo "🔐 Signing app with ad-hoc signature..."
        # Usar firma ad-hoc en GitHub Actions (para evitar problemas de Gatekeeper)
        codesign --force --deep --sign - "$APP_PATH"
        
        # Verificar firma
        codesign --verify --deep --verbose=2 "$APP_PATH"
        echo "✅ App signed successfully"
        
    - name: Create normal DMG
      run: |
        echo "🎨 Creating normal macOS DMG..."
        
        # Configuración
        VOLUME_NAME="Cronux"
        DMG_NAME="Cronux-v${{ github.event.inputs.version || '3.0.0' }}-build${{ github.run_number }}"
        DMG_TEMP="${DMG_NAME}_temp.dmg"
        DMG_FINAL="${DMG_NAME}.dmg"
        
        # Crear directorio temporal
        DMG_DIR="dmg_staging"
        rm -rf "$DMG_DIR"
        mkdir -p "$DMG_DIR"
        
        # Copiar app y crear enlace a Applications
        cp -R "$APP_PATH" "$DMG_DIR/"
        ln -s /Applications "$DMG_DIR/Applications"
        
        # Crear DMG temporal
        echo "💿 Creando DMG temporal..."
        hdiutil create -volname "$VOLUME_NAME" -srcfolder "$DMG_DIR" -ov -format UDRW "$DMG_TEMP"
        
        # Montar y configurar
        echo "📂 Montando DMG para configuración..."
        MOUNT_OUTPUT=$(hdiutil attach -readwrite -noverify -noautoopen "$DMG_TEMP" 2>&1)
        MOUNT_DIR=$(echo "$MOUNT_OUTPUT" | grep -E '/Volumes/' | awk '{print $3}' | head -1)
        
        if [ -n "$MOUNT_DIR" ]; then
          echo "✅ DMG montado en: $MOUNT_DIR"
          
          # Configurar vista normal
          echo "🎨 Configurando layout normal..."
          osascript << EOF
          tell application "Finder"
              tell disk "$VOLUME_NAME"
                  open
                  delay 2
                  
                  -- Configurar vista básica normal
                  set current view of container window to icon view
                  set toolbar visible of container window to false
                  set statusbar visible of container window to false
                  
                  -- Tamaño de ventana
                  set the bounds of container window to {200, 200, 700, 450}
                  
                  -- Configurar iconos con diseño normal
                  set viewOptions to the icon view options of container window
                  set arrangement of viewOptions to not arranged
                  set icon size of viewOptions to 128
                  set text size of viewOptions to 12
                  
                  -- Sin fondo personalizado (usar el por defecto de macOS)
                  
                  delay 2
                  close
              end tell
          end tell
        EOF
          
          echo "✅ Layout normal configurado"
          
          # Esperar antes de desmontar
          sleep 3
          
          # Desmontar
          echo "📤 Desmontando DMG..."
          for i in {1..3}; do
            if hdiutil detach "$MOUNT_DIR" 2>/dev/null; then
              echo "✅ DMG desmontado"
              break
            else
              echo "⚠️ Reintento $i/3..."
              sleep 2
              if [ $i -eq 3 ]; then
                hdiutil detach "$MOUNT_DIR" -force
              fi
            fi
          done
        else
          echo "❌ No se pudo montar el DMG"
        fi
        
        # Esperar antes de convertir
        sleep 5
        
        # Convertir a DMG final comprimido
        echo "🗜️ Creando DMG final comprimido..."
        hdiutil convert "$DMG_TEMP" -format UDZO -imagekey zlib-level=9 -o "$DMG_FINAL"
        
        # Limpiar
        rm -f "$DMG_TEMP"
        rm -rf "$DMG_DIR"
        
        echo "DMG_NAME=${DMG_NAME}" >> $GITHUB_ENV
        echo "✅ Normal DMG created: ${DMG_NAME}.dmg ($(du -sh "${DMG_NAME}.dmg" | cut -f1))"
        
    - name: Upload DMG
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.DMG_NAME }}
        path: ${{ env.DMG_NAME }}.dmg
        retention-days: 30
        
    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ env.DMG_NAME }}.dmg
        body: |
          ## Cronux GUI ${{ github.event.inputs.version || '3.0.0' }}
          
          ### 📦 Instalación
          1. Descarga el DMG
          2. Arrastra Cronux.app a Applications  
          3. Ejecuta desde Launchpad
          
          ### ✨ Características
          - ✅ Sin doble icono (compilado con Flutter)
          - ✅ Interfaz nativa de macOS
          - ✅ Universal binary (Intel + Apple Silicon)
          
          Build: ${{ github.run_number }} | Commit: ${{ github.sha }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}