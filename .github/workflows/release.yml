name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., v3.0.0)'
        required: true
        default: 'v3.0.0'

jobs:
  create-release:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flet
        
    - name: Get version
      id: version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
        else
          echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        fi
        
    - name: Build macOS app
      run: |
        flet build macos \
          --product "Cronux" \
          --project cronux \
          --build-version ${{ steps.version.outputs.version }} \
          --build-number ${{ github.run_number }} \
          --org com.cronux \
          --bundle-id com.cronux.gui \
          --description "Sistema de control de versiones local" \
          --copyright "Copyright © 2024 Cronux"
          
    - name: Create DMG
      run: |
        # Crear DMG con nombre de versión
        hdiutil create -volname "Cronux ${{ steps.version.outputs.version }}" \
          -srcfolder build/macos/Cronux.app \
          -ov -format UDZO \
          Cronux-${{ steps.version.outputs.version }}-macOS.dmg
          
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.version.outputs.version }}
        name: Cronux GUI ${{ steps.version.outputs.version }}
        files: |
          Cronux-${{ steps.version.outputs.version }}-macOS.dmg
        body: |
          ## 🎉 Cronux GUI ${{ steps.version.outputs.version }}
          
          ### 📦 Instalación
          1. Descarga `Cronux-${{ steps.version.outputs.version }}-macOS.dmg`
          2. Abre el archivo DMG
          3. Arrastra **Cronux.app** a la carpeta **Applications**
          4. Ejecuta Cronux desde Launchpad o Applications
          
          ### ✨ Características Principales
          - ✅ **Icono único** - Sin problema de doble icono
          - ✅ **Interfaz nativa** - Compilado con Flutter para macOS
          - ✅ **Sistema de versiones local** - Control completo de tus proyectos
          - ✅ **Tema claro/oscuro** - Se adapta a tu preferencia
          - ✅ **Multiplataforma** - Funciona en macOS 10.15+
          
          ### 🔧 Información Técnica
          - **Compilado en:** macOS 14+ (GitHub Actions)
          - **Python:** 3.11
          - **Flutter:** 3.19.0
          - **Flet:** Latest stable
          - **Arquitectura:** Universal (Intel + Apple Silicon)
          - **Build:** ${{ github.run_number }}
          - **Commit:** ${{ github.sha }}
          
          ### 🐛 Problemas Conocidos
          - Ninguno reportado en esta versión
          
          ### 📝 Notas
          - Esta versión fue compilada usando `flet build macos` en GitHub Actions
          - Resuelve completamente el problema del doble icono en el dock
          - Compatible con macOS 10.15 (Catalina) y superior
          
          ---
          
          **¿Problemas?** Abre un [issue](../../issues) en GitHub.
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}